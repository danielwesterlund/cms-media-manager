<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTI Media Manager (No Build)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Media Library</h1>
          <p>Standalone HTML/JS version. No Node or npm required.</p>
        </div>
        <div class="topbar-actions">
          <label class="upload-btn" for="fileInput">Upload</label>
          <input id="fileInput" type="file" multiple />
        </div>
      </header>

      <section class="toolbar">
        <input id="searchInput" type="search" placeholder="Search title, file, domain, tags..." />
        <select id="sortSelect">
          <option value="updatedAt-desc">Updated (newest)</option>
          <option value="updatedAt-asc">Updated (oldest)</option>
          <option value="createdAt-desc">Created (newest)</option>
          <option value="createdAt-asc">Created (oldest)</option>
          <option value="title-asc">Title (A-Z)</option>
          <option value="title-desc">Title (Z-A)</option>
        </select>
        <select id="kindFilter">
          <option value="">All Types</option>
        </select>
        <select id="domainFilter">
          <option value="">All Domains</option>
        </select>
        <input id="tagFilter" type="text" placeholder="Tag contains..." />
        <div class="view-toggle">
          <button id="gridViewBtn" class="active" type="button">Grid</button>
          <button id="listViewBtn" type="button">List</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel folders-panel">
          <div class="panel-header">Folders</div>
          <div id="folderTree" class="folder-tree"></div>
        </aside>

        <section id="assetDropZone" class="panel assets-panel">
          <div class="panel-header">
            <span id="resultCount">0 assets</span>
            <span id="selectionCount">0 selected</span>
          </div>
          <div id="assetsContainer" class="assets-grid"></div>
        </section>

        <aside class="panel inspector-panel">
          <div class="panel-header">Inspector</div>
          <div id="inspector" class="inspector-empty">Select an asset to edit metadata.</div>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
